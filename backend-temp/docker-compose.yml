version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumina-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: luminabank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
